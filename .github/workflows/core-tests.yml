name: Core Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x

      - name: Restore locked dependencies
        run: dotnet restore Tests/RandomTowerDefense.Core.Tests/RandomTowerDefense.Core.Tests.csproj --locked-mode

      - name: Run Core tests
        run: dotnet test Tests/RandomTowerDefense.Core.Tests/RandomTowerDefense.Core.Tests.csproj --configuration Release --no-restore

      - name: Validate Unity project layout
        shell: pwsh
        run: ./scripts/Test-ProjectLayout.ps1
